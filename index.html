<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Name Checker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            text-align: center;
        }

        input, button {
            padding: 10px;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        img {
            margin-top: 15px;
            width: 120px;
            display: none;
        }
    </style>
</head>

<body>

    <h2>Enter your name</h2>
    <input type="text" id="name" placeholder="Your name">
    <button onclick="checkName()">Check</button>

    <div id="result"></div>
    <img id="resultImage" alt="result image">

    <script>
        function checkName() {
            const name = document.getElementById("name").value.trim();
            const result = document.getElementById("result");
            const image = document.getElementById("resultImage");

            if (name === "") {
                result.textContent = "Please enter a name.";
                image.style.display = "none";
                return;
            }

            if (name.toLowerCase().includes("n")) {
                result.textContent = "You are a Nigga";
                image.src = "https://www.bing.com/images/search?view=detailV2&ccid=GLNhT5f5&id=580D291D4229F6D877444CC86946428E459CB1EF&thid=OIP.GLNhT5f5cyX9euFHbdSmuwHaHa&mediaurl=https%3a%2f%2fi.pinimg.com%2f736x%2f70%2fa4%2f67%2f70a467478b51a019c3536d2fc767cff7.jpg&cdnurl=https%3a%2f%2fth.bing.com%2fth%2fid%2fR.18b3614f97f97325fd7ae1476dd4a6bb%3frik%3d77GcRY5CRmnITA%26pid%3dImgRaw%26r%3d0&exph=500&expw=500&q=funny+nigga+image&FORM=IRPRST&ck=49A2B4CBCF4071EEDCAE80E9E6DFA532&selectedIndex=0&itb=0&idpp=overlayview&ajaxhist=0&ajaxserp=0";
                
            } else {
                result.textContent = "You have a bright future";
                image.src = "success.png";
            }

            image.style.display = "block";
        }
    </script>

</body>
</html>
